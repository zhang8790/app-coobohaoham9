<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>来电有喜 · 幸运转盘（墨韵干净版）</title>
<style>
  :root{
    --paper-1:#E9E1D2;
    --paper-2:#DDD2BC;
    --card:#F1E9D9;
    --card-line:#D8CDB6;
    --ink:#2B2620;
    --ink-soft:#6B6358;
    --ink-faint:#948B7A;
    --zhusha:#A8552E;   /* 沉稳赭红 */
    --zhusha-d:#8C4222;
    --gold:#BE9A4E;     /* 古金 */
    --gold-d:#9C7C3C;
    --qing:#5E7B72;     /* 淡青，作第二强调 */
    --shadow:0 1px 2px rgba(43,38,32,.06), 0 6px 18px rgba(43,38,32,.08);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #EFE8D9 0%, var(--paper-1) 42%, var(--paper-2) 100%);
    display:flex; justify-content:center;
    min-height:100%;
  }
  /* 极淡纸纹，透明度极低，不闪 */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none;
    background-image:radial-gradient(rgba(43,38,32,.025) 1px, transparent 1px);
    background-size:3px 3px; opacity:.6;
  }
  .phone{
    position:relative; width:100%; max-width:430px; min-height:100vh;
    padding:18px 16px 28px; display:flex; flex-direction:column; gap:16px;
  }

  /* 顶部 HUD */
  .hud{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--card); border:1px solid var(--card-line); border-radius:16px;
    padding:12px 14px; box-shadow:var(--shadow);
  }
  .hud .who{display:flex; align-items:center; gap:10px;}
  .hud .avatar{
    width:38px; height:38px; border-radius:12px; flex:none;
    background:linear-gradient(160deg,#EFE6D3,#E2D6BE);
    border:1px solid var(--card-line);
    display:grid; place-items:center; color:var(--zhusha); font-weight:700; font-size:16px;
  }
  .hud .name{font-size:14px; font-weight:600; line-height:1.2;}
  .hud .rank{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .hud .bean{display:flex; align-items:center; gap:7px;
    background:#E7DCC4; border:1px solid var(--card-line); border-radius:999px; padding:7px 12px;}
  .hud .bean .dot{width:14px; height:14px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #D9BD7B, var(--gold)); border:1px solid var(--gold-d);}
  .hud .bean b{font-size:15px; color:var(--gold-d); letter-spacing:.3px;}
  .hud .bean span{font-size:11px; color:var(--ink-soft);}

  /* 段位进度 */
  .rankbar{
    background:var(--card); border:1px solid var(--card-line); border-radius:14px;
    padding:12px 14px; box-shadow:var(--shadow);
  }
  .rankbar .top{display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); margin-bottom:8px;}
  .rankbar .top b{color:var(--zhusha); font-size:13px;}
  .track{height:8px; border-radius:999px; background:#E2D7BF; overflow:hidden;}
  .track i{display:block; height:100%; width:62%;
    background:linear-gradient(90deg,var(--zhusha),var(--gold)); border-radius:999px;}
  .rankbar .hint{font-size:11px; color:var(--ink-faint); margin-top:7px;}

  /* 转盘区 */
  .stage{
    position:relative; display:flex; flex-direction:column; align-items:center; gap:14px;
    padding:6px 0 2px;
  }
  .wheel-wrap{position:relative; width:300px; height:300px;}
  .wheel-ring{
    position:absolute; inset:-9px; border-radius:50%;
    background:var(--card); border:1px solid var(--card-line); box-shadow:var(--shadow);
  }
  .wheel-ring::after{content:""; position:absolute; inset:9px; border-radius:50%;
    border:1px dashed rgba(43,38,32,.14);}
  svg.wheel{width:100%; height:100%; display:block;
    transition:transform 4.6s cubic-bezier(.12,.78,.18,1); transform:rotate(0deg);}
  .pointer{
    position:absolute; top:-6px; left:50%; transform:translateX(-50%);
    width:30px; height:34px; z-index:5;
  }
  .hub{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:78px; height:78px; border-radius:50%; z-index:4;
    background:linear-gradient(160deg,#EFE6D3,#E0D4BB);
    border:1px solid var(--card-line); box-shadow:var(--shadow);
    display:grid; place-items:center; text-align:center;
  }
  .hub .t{font-size:13px; font-weight:700; color:var(--zhusha); line-height:1.15;}
  .hub .s{font-size:10px; color:var(--ink-soft); margin-top:2px;}

  .spin-btn{
    border:none; cursor:pointer; font-family:inherit;
    background:var(--zhusha); color:#F6EFE0; font-size:15px; font-weight:700;
    padding:13px 40px; border-radius:999px; box-shadow:var(--shadow);
    letter-spacing:1px; transition:transform .12s ease, background .2s;
  }
  .spin-btn:active{transform:scale(.97);}
  .spin-btn:disabled{background:#B9AFA0; cursor:not-allowed;}
  .spin-note{font-size:11px; color:var(--ink-faint);}

  /* 中奖记录 / 规则：干净双栏 */
  .panel{
    background:var(--card); border:1px solid var(--card-line); border-radius:14px;
    padding:14px; box-shadow:var(--shadow);
  }
  .panel h3{font-size:13px; color:var(--ink); margin-bottom:10px;
    display:flex; align-items:center; gap:7px; font-weight:700;}
  .panel h3::before{content:""; width:4px; height:14px; border-radius:2px; background:var(--zhusha);}
  .log{display:flex; flex-direction:column; gap:9px;}
  .log .row{display:flex; align-items:center; justify-content:space-between; font-size:12.5px;}
  .log .row .l{display:flex; align-items:center; gap:9px; color:var(--ink);}
  .log .row .ic{width:26px; height:26px; border-radius:8px; flex:none;
    background:#E7DCC4; border:1px solid var(--card-line); display:grid; place-items:center; color:var(--qing);}
  .log .row .meta{font-size:11px; color:var(--ink-faint); margin-top:1px;}
  .log .row .gain{font-weight:700; color:var(--gold-d); font-size:13px;}
  .log .row .gain.zero{color:var(--ink-faint); font-weight:500;}

  .rules{display:flex; flex-direction:column; gap:7px; font-size:12px; color:var(--ink-soft);}
  .rules div{display:flex; gap:8px; align-items:flex-start;}
  .rules .k{color:var(--zhusha); font-weight:700; flex:none;}

  /* 飘落金豆（克制：仅 6 颗、短促） */
  .fall{position:fixed; top:-20px; font-size:16px; pointer-events:none; z-index:30;
    animation:fall 1.1s ease-in forwards;}
  @keyframes fall{
    0%{transform:translateY(0) rotate(0); opacity:0;}
    18%{opacity:1;}
    100%{transform:translateY(78vh) rotate(220deg); opacity:0;}
  }
  @media (prefers-reduced-motion: reduce){ .fall{display:none;} svg.wheel{transition:none !important;} }
</style>
</head>
<body>
  <div class="phone">

    <!-- 顶部 HUD -->
    <div class="hud">
      <div class="who">
        <div class="avatar">侠</div>
        <div>
          <div class="name">林知 · 少侠</div>
          <div class="rank">青衫游侠 · 距「墨客」还差 <b style="color:var(--zhusha)">380</b> 金豆</div>
        </div>
      </div>
      <div class="bean">
        <span class="dot"></span>
        <b id="beanNum">1,620</b>
        <span>金豆</span>
      </div>
    </div>

    <!-- 段位进度 -->
    <div class="rankbar">
      <div class="top"><span>段位进度</span><b>少侠 → 墨客</b></div>
      <div class="track"><i></i></div>
      <div class="hint">每日首抽免费 · 累计抽满 10 次解锁「转运礼包」</div>
    </div>

    <!-- 转盘 -->
    <div class="stage">
      <div class="wheel-wrap">
        <div class="wheel-ring"></div>
        <svg class="wheel" id="wheel" viewBox="0 0 300 300">
          <g id="segs" transform="translate(150,150)"></g>
        </svg>
        <svg class="pointer" viewBox="0 0 30 34">
          <path d="M15 33 L3 8 Q15 0 27 8 Z" fill="#A8552E" stroke="#8C4222" stroke-width="1.2"/>
          <circle cx="15" cy="11" r="3.4" fill="#F6EFE0"/>
        </svg>
        <div class="hub"><div><div class="t">幸运转盘</div><div class="s">每日一运</div></div></div>
      </div>

      <button class="spin-btn" id="spinBtn">转 一 次</button>
      <div class="spin-note">本日免费次数剩余 <b id="freeLeft">1</b> 次</div>
    </div>

    <!-- 中奖记录 -->
    <div class="panel">
      <h3>近期运势</h3>
      <div class="log" id="log">
        <div class="row">
          <div class="l"><span class="ic">豆</span><div><div>+20 金豆</div><div class="meta">10 分钟前 · 第 9 抽</div></div></div>
          <div class="gain">+20</div>
        </div>
        <div class="row">
          <div class="l"><span class="ic">券</span><div><div>满 50 减 8 券</div><div class="meta">1 小时前 · 第 8 抽</div></div></div>
          <div class="gain">券</div>
        </div>
        <div class="row">
          <div class="l"><span class="ic">—</span><div><div>谢谢惠顾</div><div class="meta">今日 · 第 7 抽</div></div></div>
          <div class="gain zero">未中</div>
        </div>
      </div>
    </div>

    <!-- 规则 -->
    <div class="panel">
      <h3>玩法说明</h3>
      <div class="rules">
        <div><span class="k">壹</span><span>每日首抽免费，之后每次消耗 10 金豆；金豆 1:1 等同余额。</span></div>
        <div><span class="k">贰</span><span>中奖金豆按 <b style="color:var(--zhusha)">5%</b> 计入「情绪豆」，不影响本金安全。</span></div>
        <div><span class="k">叁</span><span>转盘仅作趣味互动，不承诺收益，理性参与。</span></div>
      </div>
    </div>

  </div>

<script>
  // 8 格奖品（低饱和配色，干净交替）
  const PRIZES = [
    { label:'+20', sub:'金豆', color:'#EFE6D3', ink:'#9C7C3C' },
    { label:'+50', sub:'金豆', color:'#E4D8C0', ink:'#9C7C3C' },
    { label:'券', sub:'满50减8', color:'#E9E0CD', ink:'#8C4222' },
    { label:'+10', sub:'金豆', color:'#EFE6D3', ink:'#9C7C3C' },
    { label:'谢谢', sub:'惠顾', color:'#E4D8C0', ink:'#6B6358' },
    { label:'+100', sub:'金豆', color:'#E9E0CD', ink:'#9C7C3C' },
    { label:'券', sub:'满30减5', color:'#EFE6D3', ink:'#8C4222' },
    { label:'+30', sub:'金豆', color:'#E4D8C0', ink:'#9C7C3C' },
  ];
  const N = PRIZES.length, STEP = 360 / N, R = 138;

  // 绘制扇形
  const segs = document.getElementById('segs');
  PRIZES.forEach((p, i) => {
    const a0 = i * STEP - 90, a1 = a0 + STEP;
    const rad = d => (d - 90) * Math.PI / 180;
    const x0 = R * Math.cos(rad(a0)), y0 = R * Math.sin(rad(a0));
    const x1 = R * Math.cos(rad(a1)), y1 = R * Math.sin(rad(a1));
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M0 0 L${x0.toFixed(2)} ${y0.toFixed(2)} A${R} ${R} 0 0 1 ${x1.toFixed(2)} ${y1.toFixed(2)} Z`);
    path.setAttribute('fill', p.color);
    path.setAttribute('stroke', '#D8CDB6'); path.setAttribute('stroke-width','1');
    segs.appendChild(path);

    // 文案（沿半径中线）
    const mid = (a0 + a1) / 2;
    const lr = rad(mid);
    const tx = (R * 0.62) * Math.cos(lr), ty = (R * 0.62) * Math.sin(lr);
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform', `translate(${tx.toFixed(2)},${ty.toFixed(2)})`);
    const t1 = document.createElementNS('http://www.w3.org/2000/svg','text');
    t1.setAttribute('text-anchor','middle'); t1.setAttribute('font-size','17');
    t1.setAttribute('font-weight','700'); t1.setAttribute('fill', p.ink);
    t1.textContent = p.label;
    const t2 = document.createElementNS('http://www.w3.org/2000/svg','text');
    t2.setAttribute('text-anchor','middle'); t2.setAttribute('y','15');
    t2.setAttribute('font-size','9.5'); t2.setAttribute('fill', p.ink); t2.setAttribute('opacity','.8');
    t2.textContent = p.sub;
    g.appendChild(t1); g.appendChild(t2); segs.appendChild(g);
  });
  // 中心描边圈
  const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('r','46'); c.setAttribute('fill','none');
  c.setAttribute('stroke','#D8CDB6'); c.setAttribute('stroke-width','1');
  segs.appendChild(c);

  // 抽奖逻辑
  const wheel = document.getElementById('wheel');
  const btn = document.getElementById('spinBtn');
  const beanNum = document.getElementById('beanNum');
  const freeLeft = document.getElementById('freeLeft');
  const log = document.getElementById('log');
  let rot = 0, free = 1, beans = 1620, busy = false;

  function dropBeans(){
    for(let i=0;i<6;i++){
      const s = document.createElement('div');
      s.className='fall'; s.textContent='🌼';
      s.style.left = (30 + Math.random()*40) + 'vw';
      s.style.animationDelay = (i*0.08)+'s';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(), 1300);
    }
  }

  btn.addEventListener('click', () => {
    if(busy) return;
    if(free <= 0 && beans < 10){ return; }
    busy = true; btn.disabled = true;
    if(free > 0){ free--; } else { beans -= 10; }

    const idx = Math.floor(Math.random() * N);
    const target = 360 * 5 + (360 - (idx * STEP + STEP/2)); // 指针在正上方
    rot += target - (rot % 360);
    wheel.style.transform = `rotate(${rot}deg)`;

    setTimeout(() => {
      const p = PRIZES[idx];
      let gain = 0, text = p.label + (p.sub==='金豆'?' 金豆':p.sub);
      if(p.sub === '金豆'){ gain = parseInt(p.label.replace('+','')); beans += gain; }
      beanNum.textContent = beans.toLocaleString();
      freeLeft.textContent = free;
      dropBeans();
      // 插入记录
      const row = document.createElement('div');
      row.className = 'row';
      const isBean = p.sub === '金豆';
      const ic = isBean ? '豆' : (p.label==='谢谢' ? '—' : '券');
      row.innerHTML = `<div class="l"><span class="ic">${ic}</span><div><div>${text}</div><div class="meta">刚刚 · 本次抽取</div></div></div>` +
        `<div class="gain ${gain?'':'zero'}">${gain?('+'+gain):(p.label==='谢谢'?'未中':p.label)}</div>`;
      log.prepend(row);
      busy = false; btn.disabled = false;
    }, 4700);
  });
</script>
</body>
</html>
