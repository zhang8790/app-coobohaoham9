<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>来电有喜 · 首页（改后源码真实效果）</title>
  <style>
    :root {
      --bg: #E9E1D2;
      --bg-deep: #DDD2BC;
      --card: #F1E9D9;
      --card-2: #F7F0E3;
      --ink: #2C2420;
      --muted: #7A6F63;
      --primary: #A8552E;
      --primary-dark: #7D3A1E;
      --gold: #BE9A4E;
      --jade: #5A7C6B;
      --line: rgba(44,36,32,0.10);
      --shadow: 0 6px 20px rgba(44,36,32,0.08);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #111; display: flex; justify-content: center; min-height: 100vh;
    }
    .phone {
      width: 100%; max-width: 390px; min-height: 100vh; background: var(--bg);
      position: relative; overflow-x: hidden; padding-bottom: 90px;
    }
    .grain {
      position: fixed; inset: 0; pointer-events: none; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    /* Header */
    .header {
      position: sticky; top: 0; z-index: 30; background: linear-gradient(180deg, var(--bg) 70%, transparent);
      padding: 10px 14px 6px;
    }
    .header-top {
      display: flex; align-items: center; gap: 10px;
    }
    .logo {
      width: 34px; height: 34px; border-radius: 50%; background: var(--card);
      border: 1.5px solid var(--primary); display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .brand-name { font-size: 18px; font-weight: 800; color: var(--ink); letter-spacing: 0.5px; }
    .location {
      margin-left: auto; display: flex; align-items: center; gap: 4px; color: var(--muted); font-size: 13px;
      background: var(--card); padding: 5px 10px; border-radius: 999px; border: 1px solid var(--line);
    }
    .search {
      margin-top: 8px; background: var(--card); border: 1px solid var(--line); border-radius: 999px;
      height: 40px; display: flex; align-items: center; gap: 8px; padding: 0 14px; color: var(--muted); font-size: 14px;
    }
    /* BeanHud */
    .bean-hud {
      margin: 10px 14px 0; background: var(--card); border-radius: 16px; padding: 14px;
      border: 1px solid var(--line); box-shadow: var(--shadow);
    }
    .bean-hud-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .bean-item { display: flex; align-items: center; gap: 6px; }
    .bean-icon {
      width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, #D4AF37, var(--gold));
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      box-shadow: 0 2px 6px rgba(190,154,78,0.25);
    }
    .bean-val { font-weight: 800; color: var(--ink); font-size: 16px; }
    .bean-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .bean-divider { width: 1px; height: 28px; background: var(--line); }
    /* RankProgress */
    .rank-card {
      margin: 10px 14px 0; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 18px; padding: 14px 16px; color: #fff; position: relative; overflow: hidden;
      box-shadow: var(--shadow);
    }
    .rank-card::after {
      content: ""; position: absolute; right: -20px; top: -20px; width: 110px; height: 110px;
      border-radius: 50%; background: rgba(255,255,255,0.08); pointer-events: none;
    }
    .rank-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .rank-title { font-size: 15px; font-weight: 700; }
    .rank-name { font-size: 12px; opacity: 0.9; background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 999px; }
    .rank-bar { height: 8px; background: rgba(255,255,255,0.2); border-radius: 999px; overflow: hidden; }
    .rank-fill { height: 100%; width: 62%; background: linear-gradient(90deg, #F2D58E, var(--gold)); border-radius: 999px; }
    .rank-foot { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.85; margin-top: 8px; }
    /* Symptom tags */
    .symptom-box {
      margin: 12px 14px 0; background: var(--card-2); border-radius: 18px; padding: 14px;
      border: 1px solid var(--line);
    }
    .symptom-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .symptom-row:last-child { margin-bottom: 0; }
    .symptom-tag {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
      background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: 8px 0;
      font-size: 13px; color: var(--ink);
    }
    /* Mood input */
    .mood-input {
      margin: 12px 14px 0; background: #fff; border: 2px solid var(--line); border-radius: 14px;
      height: 52px; display: flex; align-items: center; padding: 0 14px; color: var(--muted); font-size: 15px;
    }
    .mood-hint { margin: 6px 14px 0; font-size: 11px; color: var(--muted); }
    /* Notice */
    .notice {
      margin: 14px 14px 0; background: var(--card); border-radius: 999px; padding: 10px 14px;
      font-size: 13px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      border: 1px solid var(--line);
    }
    /* Section */
    .section {
      margin: 22px 14px 0;
    }
    .section-head {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .section-title { display: flex; align-items: center; gap: 6px; font-size: 17px; font-weight: 800; color: var(--ink); }
    .section-dot { width: 4px; height: 18px; border-radius: 999px; background: var(--primary); }
    .section-more { font-size: 13px; color: var(--primary); }
    /* Scenes */
    .scene-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .scene-item {
      background: var(--card); border-radius: 16px; padding: 14px 6px; text-align: center;
      border: 1px solid var(--line);
    }
    .scene-icon {
      width: 44px; height: 44px; margin: 0 auto 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      background: #fff; border: 1.5px solid var(--line);
    }
    .scene-icon svg { width: 26px; height: 26px; stroke: var(--jade); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .scene-name { font-size: 12px; color: var(--ink); }
    /* Recommend */
    .rec-card {
      background: var(--card); border-radius: 16px; padding: 12px; border: 1px solid var(--line);
      display: flex; gap: 12px;
    }
    .rec-img {
      width: 90px; height: 90px; border-radius: 12px; background: #E0D8C8; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px;
    }
    .rec-title { font-size: 15px; font-weight: 700; color: var(--ink); }
    .rec-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .rec-tag { display: inline-block; margin-top: 8px; background: var(--gold); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 999px; }
    /* TabBar */
    .tabbar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 390px;
      height: 70px; background: rgba(241,233,217,0.96); backdrop-filter: blur(8px);
      border-top: 1px solid var(--line); display: flex; justify-content: space-around; align-items: center;
      padding-bottom: 10px; z-index: 40;
    }
    .tab-item { text-align: center; color: var(--muted); font-size: 11px; }
    .tab-item.active { color: var(--primary); font-weight: 700; }
    .tab-icon { font-size: 22px; line-height: 1; margin-bottom: 2px; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="grain"></div>

    <div class="header">
      <div class="header-top">
        <div class="logo">喜</div>
        <div class="brand-name">来电有喜</div>
        <div class="location">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-7.5-5.5-7.5-12.5a7.5 7.5 0 0 1 15 0c0 7-7.5 12.5-7.5 12.5z"/><circle cx="12" cy="9.5" r="2.5"/></svg>
          上海
        </div>
      </div>
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        搜一搜情绪好物
      </div>
    </div>

    <!-- 新增：会员资产条 -->
    <div class="bean-hud">
      <div class="bean-hud-row">
        <div style="text-align:center;flex:1">
          <div class="bean-item" style="justify-content:center"><div class="bean-icon">豆</div><div class="bean-val">1,620</div></div>
          <div class="bean-label">金豆</div>
        </div>
        <div class="bean-divider"></div>
        <div style="text-align:center;flex:1">
          <div class="bean-val">¥128.50</div>
          <div class="bean-label">佣金</div>
        </div>
        <div class="bean-divider"></div>
        <div style="text-align:center;flex:1">
          <div class="bean-val">340</div>
          <div class="bean-label">积分</div>
        </div>
      </div>
    </div>

    <!-- 新增：段位进度卡 -->
    <div class="rank-card">
      <div class="rank-top">
        <div class="rank-title">少侠之路</div>
        <div class="rank-name">当前：少侠</div>
      </div>
      <div class="rank-bar"><div class="rank-fill"></div></div>
      <div class="rank-foot">
        <span>凡心 0</span>
        <span>再得 380 金豆晋升「初心」</span>
        <span>初心 200</span>
      </div>
    </div>

    <div class="symptom-box">
      <div class="symptom-row">
        <div class="symptom-tag">😷 感冒了</div>
        <div class="symptom-tag">🗣 嗓子疼</div>
        <div class="symptom-tag">🔥 上火长痘</div>
      </div>
      <div class="symptom-row">
        <div class="symptom-tag">😵 睡不着</div>
        <div class="symptom-tag">🤢 胃不舒服</div>
        <div class="symptom-tag">🧊 怕冷畏寒</div>
      </div>
      <div class="symptom-row">
        <div class="symptom-tag">🌿 肠胃弱</div>
        <div class="symptom-tag">🩸 姨妈痛</div>
        <div class="symptom-tag"></div>
      </div>
    </div>

    <div class="mood-input">说说心情，自动为你配对好物...</div>
    <div class="mood-hint">食养参考 · 不替代医嘱</div>

    <div class="notice">张*** 在 巫山烤鱼 下单 ¥158 的 巫山烤鱼</div>

    <div class="section">
      <div class="section-head">
        <div class="section-title"><div class="section-dot"></div>选个场景</div>
        <div class="section-more">查看全部</div>
      </div>
      <div class="scene-grid">
        <div class="scene-item">
          <div class="scene-icon"><svg viewBox="0 0 64 64"><path d="M32 10c-8 6-14 16-14 26 0 10 6 18 14 18s14-8 14-18C46 26 40 16 32 10z"/><path d="M32 28v8"/><path d="M28 36c2 3 8 3 10 0"/></svg></div>
          <div class="scene-name">舒心空间</div>
        </div>
        <div class="scene-item">
          <div class="scene-icon"><svg viewBox="0 0 64 64"><ellipse cx="32" cy="34" rx="18" ry="14"/><path d="M20 28c4-8 20-8 24 0"/><path d="M26 38h12"/></svg></div>
          <div class="scene-name">用餐时光</div>
        </div>
        <div class="scene-item">
          <div class="scene-icon"><svg viewBox="0 0 64 64"><path d="M18 20h28v34H18z"/><path d="M24 20v-6c0-4 4-6 8-6s8 2 8 6v6"/><circle cx="32" cy="37" r="5"/></svg></div>
          <div class="scene-name">购物时刻</div>
        </div>
        <div class="scene-item">
          <div class="scene-icon"><svg viewBox="0 0 64 64"><path d="M14 50V18l18-8 18 8v32"/><path d="M20 26h24"/><path d="M20 36h18"/></svg></div>
          <div class="scene-name">学习空间</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div class="section-title"><div class="section-dot"></div>为你推荐</div>
      </div>
      <div class="rec-card">
        <div class="rec-img">店图</div>
        <div>
          <div class="rec-title">精选好店</div>
          <div class="rec-meta">来店有喜官方店 · 5 精选</div>
          <div class="rec-tag">进店逛逛</div>
        </div>
      </div>
    </div>

    <div class="tabbar">
      <div class="tab-item active"><div class="tab-icon">🏠</div>首页</div>
      <div class="tab-item"><div class="tab-icon">🏪</div>自营</div>
      <div class="tab-item"><div class="tab-icon">🏛</div>品牌馆</div>
      <div class="tab-item"><div class="tab-icon">🎒</div>行囊</div>
      <div class="tab-item"><div class="tab-icon">🗡</div>侠客</div>
    </div>
  </div>
</body>
</html>
