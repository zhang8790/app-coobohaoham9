<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>来电有喜 · 首页效果（墨韵国潮版）</title>
<style>
  :root{
    --paper-1:#E9E1D2; --paper-2:#DDD2BC;
    --card:#F1E9D9; --card-line:#D8CDB6;
    --ink:#2B2620; --ink-soft:#6B6358; --ink-faint:#948B7A;
    --zhusha:#A8552E; --zhusha-d:#8C4222;
    --gold:#BE9A4E; --gold-d:#9C7C3C;
    --qing:#5E7B72;
    --shadow:0 1px 2px rgba(43,38,32,.06),0 6px 18px rgba(43,38,32,.08);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
    color:var(--ink); background:radial-gradient(120% 80% at 50% -10%, #EFE8D9 0%, var(--paper-1) 42%, var(--paper-2) 100%);
    display:flex; justify-content:center; min-height:100%;}
  body::before{content:""; position:fixed; inset:0; pointer-events:none; opacity:.5;
    background-image:radial-gradient(rgba(43,38,32,.025) 1px,transparent 1px); background-size:3px 3px;}
  .phone{position:relative; width:100%; max-width:430px; min-height:100vh; display:flex; flex-direction:column;
    background:linear-gradient(180deg,#EDE6D6,#E7DFCD); box-shadow:0 0 40px rgba(43,38,32,.08);}
  .statusbar{display:flex; justify-content:space-between; align-items:center; padding:10px 18px 4px; font-size:12px; color:var(--ink-soft);}
  .scroll{flex:1; overflow:hidden; padding:4px 16px 18px; display:flex; flex-direction:column; gap:14px;}

  /* 顶部：定位 + 搜索 + 金豆 */
  .top{display:flex; align-items:center; gap:10px;}
  .loc{display:flex; align-items:center; gap:5px; font-size:13px; font-weight:600; flex:none;}
  .loc svg{width:16px; height:16px;}
  .search{flex:1; display:flex; align-items:center; gap:7px; background:var(--card);
    border:1px solid var(--card-line); border-radius:999px; padding:8px 13px; box-shadow:var(--shadow);}
  .search svg{width:16px; height:16px; color:var(--ink-faint); flex:none;}
  .search span{font-size:12.5px; color:var(--ink-faint);}
  .bean{display:flex; align-items:center; gap:6px; flex:none; background:#E7DCC4;
    border:1px solid var(--card-line); border-radius:999px; padding:7px 11px; box-shadow:var(--shadow);}
  .bean .dot{width:13px; height:13px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #D9BD7B, var(--gold)); border:1px solid var(--gold-d);}
  .bean b{font-size:14px; color:var(--gold-d);}

  /* 段位进度卡（基于现有 member_rank 字段的视觉呈现，非新增功能） */
  .rank{background:var(--card); border:1px solid var(--card-line); border-radius:14px; padding:12px 14px; box-shadow:var(--shadow);}
  .rank .r1{display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--ink-soft);}
  .rank .r1 b{color:var(--zhusha); font-size:13px;}
  .rank .r2{font-size:11px; color:var(--ink-faint); margin:5px 0 8px;}
  .track{height:8px; border-radius:999px; background:#E2D7BF; overflow:hidden;}
  .track i{display:block; height:100%; width:62%; background:linear-gradient(90deg,var(--zhusha),var(--gold)); border-radius:999px;}

  /* 区块标题 */
  .sec-h{display:flex; align-items:center; justify-content:space-between; margin-top:2px;}
  .sec-h .t{font-size:14.5px; font-weight:800; color:var(--ink); display:flex; align-items:center; gap:7px;}
  .sec-h .t::before{content:""; width:4px; height:15px; border-radius:2px; background:var(--zhusha);}
  .sec-h .more{font-size:11.5px; color:var(--ink-faint);}

  /* 场景四宫格（手绘图标，现有江湖场景） */
  .grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
  .cell{background:var(--card); border:1px solid var(--card-line); border-radius:14px; padding:13px 6px 11px;
    display:flex; flex-direction:column; align-items:center; gap:7px; box-shadow:var(--shadow);}
  .cell .ic{width:42px; height:42px; border-radius:12px; background:#E9DECA; border:1px solid var(--card-line);
    display:grid; place-items:center;}
  .cell .ic svg{width:24px; height:24px;}
  .cell .nm{font-size:12px; font-weight:700; color:var(--ink);}
  .cell .ds{font-size:10px; color:var(--ink-faint);}

  /* 会员专享卡 */
  .vip{display:flex; align-items:center; gap:12px; background:linear-gradient(120deg,#EFE6D2,#E0D4BA);
    border:1px solid var(--card-line); border-radius:16px; padding:14px 16px; box-shadow:var(--shadow);}
  .vip .l{flex:1;}
  .vip .l .h{font-size:14px; font-weight:800; color:var(--zhusha-d);}
  .vip .l .p{font-size:11.5px; color:var(--ink-soft); margin-top:4px;}
  .vip .cp{font-size:11px; color:var(--gold-d); background:#E7DCC4; border:1px solid var(--card-line); border-radius:8px; padding:6px 10px; font-weight:700;}

  /* 好物推荐（含金豆价，基于现有 gold_beans 返豆） */
  .goods{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .gcard{background:var(--card); border:1px solid var(--card-line); border-radius:14px; padding:11px; box-shadow:var(--shadow);}
  .gcard .ph{height:84px; border-radius:10px; background:linear-gradient(160deg,#E7DCC4,#D9CDB2);
    display:grid; place-items:center; color:var(--qing);}
  .gcard .ph svg{width:34px; height:34px;}
  .gcard .nm{font-size:12.5px; font-weight:600; margin-top:8px; color:var(--ink); line-height:1.3;}
  .gcard .pr{display:flex; align-items:center; gap:6px; margin-top:7px;}
  .gcard .pr .y{font-size:14px; font-weight:800; color:var(--zhusha);}
  .gcard .pr .b{font-size:11px; color:var(--gold-d); display:flex; align-items:center; gap:3px;}
  .gcard .pr .b .dot{width:10px; height:10px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #D9BD7B, var(--gold));}

  /* 底部 tabbar（对齐真实 5 主入口，无新增） */
  .tabbar{display:flex; justify-content:space-around; align-items:flex-end; padding:8px 6px 10px;
    background:var(--card); border-top:1px solid var(--card-line); margin-top:auto;}
  .tab{display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--ink-faint); font-size:10.5px;}
  .tab svg{width:23px; height:23px;}
  .tab.on{color:var(--zhusha);}
  .tab.on svg{color:var(--zhusha);}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span>来电有喜 · 江湖</span><span>📶 100%</span></div>

  <div class="scroll">
    <!-- 顶部 -->
    <div class="top">
      <div class="loc">
        <svg viewBox="0 0 64 64" fill="none" stroke="#A8552E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M32 8 C20 8 14 18 14 28 C14 42 32 56 32 56 C32 56 50 42 50 28 C50 18 44 8 32 8 Z"/><circle cx="32" cy="27" r="7"/></svg>
        杭州·西湖
      </div>
      <div class="search">
        <svg viewBox="0 0 64 64" fill="none" stroke="#948B7A" stroke-width="2.6" stroke-linecap="round"><circle cx="28" cy="28" r="16"/><path d="M40 40 L54 54"/></svg>
        <span>搜江湖好物 / 情绪面馆…</span>
      </div>
      <div class="bean"><span class="dot"></span><b>1,620</b></div>
    </div>

    <!-- 段位进度（现有 member_rank 的视觉呈现） -->
    <div class="rank">
      <div class="r1"><span>少侠 · 林知</span><b>少侠 → 墨客</b></div>
      <div class="r2">再得 380 金豆晋升「墨客」，解锁专属段位礼</div>
      <div class="track"><i></i></div>
    </div>

    <!-- 场景四宫格（现有江湖场景，手绘图标） -->
    <div class="sec-h"><div class="t">江湖场景</div><div class="more">全部 ›</div></div>
    <div class="grid4">
      <div class="cell"><div class="ic">
        <svg viewBox="0 0 64 64" fill="none" stroke="#5E7B72" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M32 52 C14 40 12 22 24 14 C30 10 34 16 32 22 C30 16 38 12 44 18 C54 28 50 44 32 52 Z"/></svg>
      </div><div class="nm">江湖小馆</div><div class="ds">本地食肆</div></div>
      <div class="cell"><div class="ic">
        <svg viewBox="0 0 64 64" fill="none" stroke="#A8552E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M16 22 H48 V40 a8 8 0 0 1 -8 8 H24 a8 8 0 0 1 -8 -8 Z"/><path d="M22 22 V18 a6 6 0 0 1 12 0 M34 22 V18 a6 6 0 0 1 12 0"/></svg>
      </div><div class="nm">情绪面馆</div><div class="ds">一碗解忧</div></div>
      <div class="cell"><div class="ic">
        <svg viewBox="0 0 64 64" fill="none" stroke="#9C7C3C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 22 H46 L50 44 H14 Z"/><path d="M24 22 V18 a8 8 0 0 1 16 0 V22"/></svg>
      </div><div class="nm">随行好物</div><div class="ds">随身精选</div></div>
      <div class="cell"><div class="ic">
        <svg viewBox="0 0 64 64" fill="none" stroke="#5E7B72" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14 H40 a4 4 0 0 1 4 4 V52 a2 2 0 0 1 -3 2 L32 46 L23 54 a2 2 0 0 1 -3 -2 V18 a4 4 0 0 1 4 -4 Z"/></svg>
      </div><div class="nm">识货书房</div><div class="ds">慢读时光</div></div>
    </div>

    <!-- 会员专享（现有段位礼） -->
    <div class="vip">
      <div class="l"><div class="h">会员专享 · 段位礼</div><div class="p">少侠专属 · 满 50 减 8 券已到账</div></div>
      <div class="cp">领取 ›</div>
    </div>

    <!-- 好物推荐（现有商品 + 金豆价） -->
    <div class="sec-h"><div class="t">江湖好物</div><div class="more">更多 ›</div></div>
    <div class="goods">
      <div class="gcard"><div class="ph">
        <svg viewBox="0 0 64 64" fill="none" stroke="#5E7B72" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 22 H46 L50 44 H14 Z"/><path d="M24 22 V18 a8 8 0 0 1 16 0 V22"/></svg>
      </div><div class="nm">随行茶礼盒</div><div class="pr"><span class="y">¥68</span><span class="b"><span class="dot"></span>赠68豆</span></div></div>
      <div class="gcard"><div class="ph">
        <svg viewBox="0 0 64 64" fill="none" stroke="#A8552E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M16 22 H48 V40 a8 8 0 0 1 -8 8 H24 a8 8 0 0 1 -8 -8 Z"/><path d="M22 22 V18 a6 6 0 0 1 12 0"/></svg>
      </div><div class="nm">解忧素面</div><div class="pr"><span class="y">¥26</span><span class="b"><span class="dot"></span>赠26豆</span></div></div>
      <div class="gcard"><div class="ph">
        <svg viewBox="0 0 64 64" fill="none" stroke="#9C7C3C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14 H40 a4 4 0 0 1 4 4 V52 a2 2 0 0 1 -3 2 L32 46 L23 54 a2 2 0 0 1 -3 -2 V18 a4 4 0 0 1 4 -4 Z"/></svg>
      </div><div class="nm">江湖手札</div><div class="pr"><span class="y">¥39</span><span class="b"><span class="dot"></span>赠39豆</span></div></div>
      <div class="gcard"><div class="ph">
        <svg viewBox="0 0 64 64" fill="none" stroke="#5E7B72" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M32 52 C14 40 12 22 24 14 C30 10 34 16 32 22 C30 16 38 12 44 18 C54 28 50 44 32 52 Z"/></svg>
      </div><div class="nm">青竹香薰</div><div class="pr"><span class="y">¥52</span><span class="b"><span class="dot"></span>赠52豆</span></div></div>
    </div>
  </div>

  <!-- tabbar（真实 5 主入口：首页/自营/品牌馆/行囊/侠客） -->
  <div class="tabbar">
    <div class="tab on">
      <svg viewBox="0 0 64 64" fill="none" stroke="#A8552E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 28 L32 12 L52 28 V52 a2 2 0 0 1 -2 2 H14 a2 2 0 0 1 -2 -2 Z"/><path d="M28 54 V40 H36 V54"/></svg>
      首页
    </div>
    <div class="tab">
      <svg viewBox="0 0 64 64" fill="none" stroke="#948B7A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 26 L32 14 L50 26 V50 a2 2 0 0 1 -2 2 H16 a2 2 0 0 1 -2 -2 Z"/><path d="M24 52 V40 H40 V52"/></svg>
      自营
    </div>
    <div class="tab">
      <svg viewBox="0 0 64 64" fill="none" stroke="#948B7A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 22 H44 V46 H20 Z"/><path d="M26 22 V18 a6 6 0 0 1 12 0 V22 M32 30 V40 M28 36 H36"/></svg>
      品牌馆
    </div>
    <div class="tab">
      <svg viewBox="0 0 64 64" fill="none" stroke="#948B7A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 22 H46 L50 44 H14 Z"/><path d="M24 22 V18 a8 8 0 0 1 16 0 V22"/></svg>
      行囊
    </div>
    <div class="tab">
      <svg viewBox="0 0 64 64" fill="none" stroke="#948B7A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="32" cy="24" r="10"/><path d="M14 54 C14 42 22 38 32 38 C42 38 50 42 50 54"/></svg>
      侠客
    </div>
  </div>
</div>
</body>
</html>
